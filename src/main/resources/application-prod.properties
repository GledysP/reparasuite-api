server.port=${SERVER_PORT:8080}

spring.datasource.url=${REPARASUITE_DB_URL}
spring.datasource.username=${REPARASUITE_DB_USERNAME}
spring.datasource.password=${REPARASUITE_DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

reparasuite.proxy.trust-forward-headers=true
reparasuite.cors.allowed-origin-patterns=${REPARASUITE_CORS_ALLOWED_ORIGIN_PATTERNS}

springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false
server.port=8080

spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=false
spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=false

# Hibernate NO gestiona el esquema
spring.jpa.hibernate.ddl-auto=validate

# Subidas
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Carpeta uploads
reparasuite.upload-dir=uploads

# JWT
reparasuite.jwt.secret=${REPARASUITE_JWT_SECRET}
reparasuite.jwt.issuer=reparasuite-api
reparasuite.jwt.exp-min=30

# CORS
reparasuite.cors.allowed-origin-patterns=

# Swagger
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.schemas=public
spring.flyway.default-schema=public
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
spring.flyway.validate-on-migrate=true
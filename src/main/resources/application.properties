server.port=8080

spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=false
spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=false
spring.jpa.hibernate.ddl-auto=validate

# Hikari / pool
spring.datasource.hikari.pool-name=ReparaSuiteHikariPool
spring.datasource.hikari.minimum-idle=${REPARASUITE_DB_MIN_IDLE:2}
spring.datasource.hikari.maximum-pool-size=${REPARASUITE_DB_MAX_POOL_SIZE:12}
spring.datasource.hikari.connection-timeout=${REPARASUITE_DB_CONNECTION_TIMEOUT_MS:30000}
spring.datasource.hikari.idle-timeout=${REPARASUITE_DB_IDLE_TIMEOUT_MS:300000}
spring.datasource.hikari.max-lifetime=${REPARASUITE_DB_MAX_LIFETIME_MS:1800000}
spring.datasource.hikari.keepalive-time=${REPARASUITE_DB_KEEPALIVE_TIME_MS:120000}
spring.datasource.hikari.validation-timeout=${REPARASUITE_DB_VALIDATION_TIMEOUT_MS:5000}

# Subidas
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Carpeta uploads
reparasuite.upload-dir=uploads

# JWT
reparasuite.jwt.secret=${REPARASUITE_JWT_SECRET}
reparasuite.jwt.issuer=${REPARASUITE_JWT_ISSUER:reparasuite-api}
reparasuite.jwt.exp-min=${REPARASUITE_JWT_EXP_MIN:30}

# Refresh token
reparasuite.refresh-token.exp-days=${REPARASUITE_REFRESH_TOKEN_EXP_DAYS:14}
reparasuite.refresh-token.cookie-name=${REPARASUITE_REFRESH_TOKEN_COOKIE_NAME:rs_refresh_token}
reparasuite.refresh-token.cookie-secure=${REPARASUITE_REFRESH_TOKEN_COOKIE_SECURE:false}
reparasuite.refresh-token.cookie-same-site=${REPARASUITE_REFRESH_TOKEN_COOKIE_SAME_SITE:Lax}
reparasuite.refresh-token.cookie-path=${REPARASUITE_REFRESH_TOKEN_COOKIE_PATH:/}

# Proxy
reparasuite.proxy.trust-forward-headers=${REPARASUITE_PROXY_TRUST_FORWARD_HEADERS:false}

# CORS
reparasuite.cors.allowed-origin-patterns=${REPARASUITE_CORS_ALLOWED_ORIGIN_PATTERNS}
reparasuite.cors.allowed-methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
reparasuite.cors.allowed-headers=Authorization,Content-Type,X-Requested-With,Accept,Origin
reparasuite.cors.exposed-headers=Authorization,X-Request-Id
reparasuite.cors.allow-credentials=true
reparasuite.cors.max-age=3600

# Rate limiting login
reparasuite.rate-limit.backoffice.max-failures=${REPARASUITE_RL_BACKOFFICE_MAX_FAILURES:5}
reparasuite.rate-limit.backoffice.block-duration-minutes=${REPARASUITE_RL_BACKOFFICE_BLOCK_MINUTES:15}
reparasuite.rate-limit.backoffice.stale-entry-hours=${REPARASUITE_RL_BACKOFFICE_STALE_HOURS:6}

reparasuite.rate-limit.portal.max-failures=${REPARASUITE_RL_PORTAL_MAX_FAILURES:5}
reparasuite.rate-limit.portal.block-duration-minutes=${REPARASUITE_RL_PORTAL_BLOCK_MINUTES:15}
reparasuite.rate-limit.portal.stale-entry-hours=${REPARASUITE_RL_PORTAL_STALE_HOURS:6}

# Rate limiting refresh
reparasuite.rate-limit.refresh.max-failures=${REPARASUITE_RL_REFRESH_MAX_FAILURES:10}
reparasuite.rate-limit.refresh.block-duration-minutes=${REPARASUITE_RL_REFRESH_BLOCK_MINUTES:15}
reparasuite.rate-limit.refresh.stale-entry-hours=${REPARASUITE_RL_REFRESH_STALE_HOURS:6}

# Swagger
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.schemas=public
spring.flyway.default-schema=public
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
spring.flyway.validate-on-migrate=true

# Actuator
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true

# Logging
logging.pattern.console=%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %-5level [%X{requestId}] %logger{36} - %msg%n
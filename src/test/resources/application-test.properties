# Base de datos en memoria para pruebas (H2)
spring.datasource.url=jdbc:h2:mem:reparasuite_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_UPPER=false
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Configuración de Hibernate para Tests
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# Inicialización
spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=true

# Configuración de Archivos (Subidas de prueba)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
reparasuite.upload-dir=target/test-uploads

# Seguridad JWT para pruebas (Secretos fijos)
reparasuite.jwt.secret=TEST_SECRET_12345678901234567890123456789012345678901234567890
reparasuite.jwt.issuer=reparasuite-api-test
reparasuite.jwt.exp-min=60

# --- ESTA ES LA LÍNEA QUE EL TEST ESTÁ BUSCANDO ---
reparasuite.cors.allowed-origin-patterns=http://localhost:4200,http://localhost:4300,http://127.0.0.1:4200

# Desactivar Swagger en pruebas
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false